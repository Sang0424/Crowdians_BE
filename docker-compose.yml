version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdians-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env.dev
    environment:
      - APP_ENV=dev
    # redis 서비스가 먼저 뜬 다음에 백엔드가 실행되도록 설정
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 로컬 개발용 Redis (6379 포트)
  redis:
    image: redis:alpine
    container_name: crowdians-redis-dev
    ports:
      - "6379:6379"

# Note: MongoDB and Redis are handled via SaaS (Atlas/Upstash)
# as per the approved architecture to keep the environment lean.
