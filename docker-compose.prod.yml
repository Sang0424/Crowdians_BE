version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: crowdians-backend-prod
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - APP_ENV=prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Note: In production, .env.prod should be securely placed on the EC2 instance.
# Logging is limited to 10MB to prevent disk exhaustion on 1GB RAM instances.
